name: Build and deploy Node.js app to Azure Web App - smart-gym-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend   # ✅ KEY FIX

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json  # ✅ IMPORTANT

      - name: Install dependencies
        run: npm ci

      - name: Build (optional)
        run: npm run build --if-present

      - name: Remove node_modules (avoid stale deps)
        run: rm -rf node_modules

      - name: Upload backend artifact only
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: backend   # ✅ ONLY backend folder

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
    id-token: write   
    contents: read    

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6095C387EC6B49CAB98BAF8CDB3F673C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2D463B28CFF84B72B3534470872495CC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4C1F2E418F41467B897F32D0DEF14D6F }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'smart-gym-backend'
          slot-name: 'Production'
          package: .